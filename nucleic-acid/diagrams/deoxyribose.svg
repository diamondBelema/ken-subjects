<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <defs>
    <linearGradient id="sugarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44a08d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="350" fill="#1a1a2e" rx="10"/>
  
  <text x="200" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Deoxyribose (DNA Sugar)</text>
  
  <!-- Pentose ring -->
  <polygon points="200,80 280,130 260,220 140,220 120,130" 
           fill="none" stroke="url(#sugarGrad)" stroke-width="4"/>
  
  <!-- Oxygen in ring -->
  <circle cx="200" cy="80" r="15" fill="#ff6b6b"/>
  <text x="200" y="85" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">O</text>
  
  <!-- Carbon 1' -->
  <circle cx="120" cy="130" r="12" fill="#4a9eff"/>
  <text x="120" y="135" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1'</text>
  
  <!-- Carbon 2' -->
  <circle cx="140" cy="220" r="12" fill="#4a9eff"/>
  <text x="140" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2'</text>
  
  <!-- Carbon 3' -->
  <circle cx="260" cy="220" r="12" fill="#4a9eff"/>
  <text x="260" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3'</text>
  
  <!-- Carbon 4' -->
  <circle cx="280" cy="130" r="12" fill="#4a9eff"/>
  <text x="280" y="135" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4'</text>
  
  <!-- Carbon 5' (attached to 4') -->
  <circle cx="340" cy="100" r="12" fill="#4a9eff"/>
  <text x="340" y="105" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5'</text>
  <line x1="285" y1="125" x2="335" y2="105" stroke="#4a9eff" stroke-width="2"/>
  
  <!-- OH groups -->
  <g fill="#ffd93d" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="120" y="170" text-anchor="middle">OH</text>
    <line x1="120" y1="142" x2="120" y2="160" stroke="#ffd93d" stroke-width="2"/>
    
    <text x="140" y="260" text-anchor="middle">H</text>
    <line x1="140" y1="232" x2="140" y2="250" stroke="#ffd93d" stroke-width="2"/>
    
    <text x="260" y="260" text-anchor="middle">OH</text>
    <line x1="260" y1="232" x2="260" y2="250" stroke="#ffd93d" stroke-width="2"/>
    
    <text x="340" y="70" text-anchor="middle">OH</text>
    <line x1="340" y1="88" x2="340" y2="75" stroke="#ffd93d" stroke-width="2"/>
  </g>
  
  <!-- Base attachment point -->
  <circle cx="80" cy="130" r="8" fill="#ff6b6b"/>
  <text x="50" y="135" text-anchor="middle" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">Base</text>
  <line x1="108" y1="130" x2="88" y2="130" stroke="#ff6b6b" stroke-width="2"/>
  
  <!-- Phosphate attachment -->
  <circle cx="380" cy="100" r="8" fill="#ffd93d"/>
  <text x="380" y="130" text-anchor="middle" fill="#ffd93d" font-family="Arial, sans-serif" font-size="10">PO₄</text>
  <line x1="352" y1="100" x2="372" y2="100" stroke="#ffd93d" stroke-width="2"/>
  
  <!-- Key difference: H at 2' (not OH like ribose) -->
  <rect x="50" y="200" width="200" height="60" fill="#2d2d44" rx="5"/>
  <text x="150" y="225" text-anchor="middle" fill="#4ecdc4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Deoxyribose = H at 2'</text>
  <text x="150" y="245" text-anchor="middle" fill="#cccccc" font-family="Arial, sans-serif" font-size="12">(Ribose has OH at 2')</text>
  
  <!-- Legend -->
  <g transform="translate(20, 310)">
    <circle cx="10" cy="5" r="6" fill="#4a9eff"/>
    <text x="22" y="9" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">Carbon</text>
    
    <circle cx="80" cy="5" r="6" fill="#ff6b6b"/>
    <text x="92" y="9" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">Oxygen</text>
    
    <circle cx="150" cy="5" r="6" fill="#ffd93d"/>
    <text x="162" y="9" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">Phosphate</text>
    
    <circle cx="240" cy="5" r="6" fill="#4ecdc4"/>
    <text x="252" y="9" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">Ring O</text>
  </g>
</svg>