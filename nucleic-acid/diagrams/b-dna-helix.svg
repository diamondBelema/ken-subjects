<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="backbone1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7dd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="backbone2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="600" fill="#1a1a2e" rx="10"/>
  
  <text x="200" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">B-DNA Double Helix</text>
  
  <!-- Left backbone (5' to 3') -->
  <path d="M 120 60 Q 80 120 120 180 Q 160 240 120 300 Q 80 360 120 420 Q 160 480 120 540" 
        stroke="url(#backbone1)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Right backbone (3' to 5') -->
  <path d="M 280 60 Q 320 120 280 180 Q 240 240 280 300 Q 320 360 280 420 Q 240 480 280 540" 
        stroke="url(#backbone2)" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Base pairs (rungs) -->
  <g stroke="#ffd93d" stroke-width="4" stroke-linecap="round">
    <line x1="130" y1="90" x2="270" y2="90"/>
    <line x1="110" y1="150" x2="290" y2="150"/>
    <line x1="130" y1="210" x2="270" y2="210"/>
    <line x1="110" y1="270" x2="290" y2="270"/>
    <line x1="130" y1="330" x2="270" y2="330"/>
    <line x1="110" y1="390" x2="290" y2="390"/>
    <line x1="130" y1="450" x2="270" y2="450"/>
    <line x1="110" y1="510" x2="290" y2="510"/>
  </g>
  
  <!-- Base pair labels -->
  <g fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <text x="145" y="85" fill="#4a9eff">A</text>
    <text x="245" y="85" fill="#ff6b6b">T</text>
    
    <text x="125" y="145" fill="#4a9eff">G</text>
    <text x="265" y="145" fill="#ff6b6b">C</text>
    
    <text x="145" y="205" fill="#4a9eff">T</text>
    <text x="245" y="205" fill="#ff6b6b">A</text>
    
    <text x="125" y="265" fill="#4a9eff">C</text>
    <text x="265" y="265" fill="#ff6b6b">G</text>
    
    <text x="145" y="325" fill="#4a9eff">A</text>
    <text x="245" y="325" fill="#ff6b6b">T</text>
    
    <text x="125" y="385" fill="#4a9eff">G</text>
    <text x="265" y="385" fill="#ff6b6b">C</text>
    
    <text x="145" y="445" fill="#4a9eff">T</text>
    <text x="245" y="445" fill="#ff6b6b">A</text>
    
    <text x="125" y="505" fill="#4a9eff">C</text>
    <text x="265" y="505" fill="#ff6b6b">G</text>
  </g>
  
  <!-- Hydrogen bonds -->
  <g stroke="#ffd93d" stroke-width="1" stroke-dasharray="4,4" opacity="0.6">
    <line x1="155" y1="88" x2="245" y2="88"/>
    <line x1="140" y1="148" x2="260" y2="148"/>
    <line x1="155" y1="208" x2="245" y2="208"/>
    <line x1="140" y1="268" x2="260" y2="268"/>
    <line x1="155" y1="328" x2="245" y2="328"/>
    <line x1="140" y1="388" x2="260" y2="388"/>
    <line x1="155" y1="448" x2="245" y2="448"/>
    <line x1="140" y1="508" x2="260" y2="508"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(20, 560)">
    <rect x="0" y="0" width="12" height="12" fill="#4a9eff"/>
    <text x="18" y="11" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">5'→3' strand</text>
    
    <rect x="120" y="0" width="12" height="12" fill="#ff6b6b"/>
    <text x="138" y="11" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">3'→5' strand</text>
    
    <rect x="240" y="0" width="12" height="12" fill="#ffd93d"/>
    <text x="258" y="11" fill="#cccccc" font-family="Arial, sans-serif" font-size="10">Base pairs</text>
  </g>
</svg>